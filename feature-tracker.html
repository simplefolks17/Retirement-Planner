<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retirement Calculator — Feature Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0d1117; color: #e6edf3; padding: 24px; font-size: 14px; }
  h1 { font-size: 18px; font-weight: 600; color: #e6edf3; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #8b949e; margin-bottom: 20px; }

  .summary { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .stat { flex: 1; min-width: 80px; background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 12px 14px; }
  .stat .num { font-size: 24px; font-weight: 600; }
  .stat .lbl { font-size: 11px; color: #8b949e; margin-top: 2px; }

  .toolbar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid #21262d; }
  .toolbar-label { font-size: 11px; color: #8b949e; margin-right: 2px; }
  .fb { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid #30363d; background: transparent; color: #8b949e; cursor: pointer; transition: all 0.15s; }
  .fb:hover { border-color: #8b949e; color: #e6edf3; }
  .fb.on { background: #21262d; color: #e6edf3; border-color: #8b949e; font-weight: 600; }

  .section-label { font-size: 10px; font-weight: 700; color: #8b949e; text-transform: uppercase; letter-spacing: 0.08em; margin: 18px 0 8px; }

  .card { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; border-radius: 10px; border: 1px solid #21262d; background: #161b22; margin-bottom: 7px; cursor: pointer; transition: border-color 0.15s; }
  .card:hover { border-color: #30363d; }
  .card.sel { border-color: #58a6ff; background: #0d1f30; }

  .card-left { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 34px; }
  .pb { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 5px; }
  .p1 { background: #3d0000; color: #f85149; }
  .p2 { background: #2d1f00; color: #d4a843; }
  .p3 { background: #001f2d; color: #58a6ff; }
  .p4 { background: #161b22; color: #8b949e; border: 1px solid #30363d; }
  .dot { width: 9px; height: 9px; border-radius: 50%; }
  .d-planned { background: #30363d; }
  .d-progress { background: #d4a843; }
  .d-done { background: #3fb950; }

  .card-body { flex: 1; min-width: 0; }
  .card-title { font-size: 14px; font-weight: 600; color: #e6edf3; margin-bottom: 3px; }
  .card-desc { font-size: 12px; color: #8b949e; line-height: 1.55; }
  .card-meta { display: flex; align-items: center; gap: 7px; margin-top: 8px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 2px 7px; border-radius: 5px; }
  .cx-badge { background: #1c2128; color: #8b949e; border: 1px solid #30363d; }
  .high-badge { background: #0d2b16; color: #3fb950; }
  .med-badge { background: #001f2d; color: #58a6ff; }

  .status-sel { font-size: 11px; padding: 3px 8px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: #e6edf3; cursor: pointer; margin-left: auto; }

  .detail { padding: 14px 16px; border-radius: 8px; border: 1px solid #1f3a5f; background: #0a1929; margin-bottom: 7px; }
  .detail h4 { font-size: 13px; font-weight: 600; color: #e6edf3; margin-bottom: 8px; }
  .detail p { font-size: 12px; color: #8b949e; line-height: 1.6; margin-bottom: 10px; }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .tag { font-size: 11px; padding: 2px 7px; border-radius: 5px; background: #1c2128; color: #8b949e; border: 1px solid #30363d; }
  .ask-btn { font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1px solid #58a6ff; background: transparent; color: #58a6ff; cursor: pointer; }
  .ask-btn:hover { background: #0d1f30; }

  .empty { text-align: center; padding: 40px; color: #8b949e; font-size: 13px; }
  .progress-bar { height: 4px; background: #21262d; border-radius: 2px; margin-top: 16px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #3fb950, #58a6ff); border-radius: 2px; transition: width 0.4s; }
  .active-header { font-size: 10px; font-weight: 700; color: #8b949e; text-transform: uppercase; letter-spacing: 0.08em; margin: 20px 0 8px; display: flex; align-items: center; gap: 8px; }
  .active-count-badge { font-size: 11px; padding: 2px 8px; border-radius: 5px; background: #2d1f00; color: #d4a843; font-weight: 600; text-transform: none; letter-spacing: 0; }
  .done-toggle { display: flex; align-items: center; gap: 10px; margin-top: 28px; padding: 12px 14px; border-radius: 8px; border: 1px solid #21262d; background: #161b22; cursor: pointer; user-select: none; }
  .done-toggle:hover { border-color: #30363d; }
  .done-toggle-label { font-size: 13px; color: #8b949e; flex: 1; }
  .done-toggle-count { font-size: 11px; padding: 2px 8px; border-radius: 5px; background: #0d2b16; color: #3fb950; font-weight: 600; }
  .done-toggle-arrow { font-size: 11px; color: #8b949e; transition: transform 0.2s; }
  .done-toggle-arrow.open { transform: rotate(180deg); }
  .done-section { display: none; margin-top: 6px; }
  .done-section.open { display: block; }
</style>
</head>
<body>

<h1>Retirement Calculator — Feature Tracker</h1>
<p class="subtitle">Planned improvements, organized by section and priority</p>

<div class="summary" id="summary"></div>
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div style="margin-top: 20px;">
  <div class="toolbar">
    <span class="toolbar-label">Filter:</span>
    <button class="fb on" onclick="setF('all')">All</button>
    <button class="fb" onclick="setF('p1')">Priority 1</button>
    <button class="fb" onclick="setF('p2')">Priority 2</button>
    <button class="fb" onclick="setF('p3')">Priority 3</button>
    <button class="fb" onclick="setF('in-progress')">In progress</button>
  </div>

  <div class="active-header">
    Up next &nbsp;<span class="active-count-badge" id="active-count"></span>
  </div>
  <div id="list"></div>

  <div class="done-toggle" onclick="toggleDone()">
    <span class="done-toggle-label">&#10003; Completed features</span>
    <span class="done-toggle-count" id="done-count"></span>
    <span class="done-toggle-arrow" id="done-arrow">&#9660;</span>
  </div>
  <div class="done-section" id="done-section">
    <div id="done-list"></div>
  </div>
</div>

var SECS = [];
DATA.forEach(function(d) { if (SECS.indexOf(d.sec) === -1) SECS.push(d.sec); });
var SL = { planned: "Planned", "in-progress": "In progress", done: "Done" };
var SC = { planned: "d-planned", "in-progress": "d-progress", done: "d-done" };
var PC = ["p1","p2","p3","p4"];

var flt = "all", sel = null, sts = {}, doneOpen = false;
DATA.forEach(function(d) { sts[d.id] = d.st; });

function getActive() {
  var base = DATA.filter(function(d) { return sts[d.id] !== "done"; });
  if (flt === "all") return base;
  if (flt === "in-progress") return base.filter(function(d) { return sts[d.id] === "in-progress"; });
  if (flt === "p1") return base.filter(function(d) { return d.pr === 1; });
  if (flt === "p2") return base.filter(function(d) { return d.pr === 2; });
  if (flt === "p3") return base.filter(function(d) { return d.pr === 3; });
  return base;
}

function buildCards(items) {
  if (!items.length) return '<div class="empty">No items match this filter.</div>';
  var bySec = {};
  SECS.forEach(function(s) {
    var it = items.filter(function(d) { return d.sec === s; });
    if (it.length) bySec[s] = it;
  });
  var h = "";
  Object.keys(bySec).forEach(function(sec) {
    h += '<div class="section-label">' + sec + '</div>';
    bySec[sec].forEach(function(item) {
      var st = sts[item.id];
      var isSel = sel === item.id;
      h += '<div class="card' + (isSel ? " sel" : "") + '" onclick="tog(' + item.id + ')">'
        + '<div class="card-left">'
        + '<span class="pb ' + (PC[item.pr - 1] || "p4") + '">P' + item.pr + '</span>'
        + '<div class="dot ' + SC[st] + '"></div>'
        + '</div>'
        + '<div class="card-body">'
        + '<div class="card-title">' + item.ti + '</div>'
        + '<div class="card-desc">' + item.ds + '</div>'
        + '<div class="card-meta">'
        + '<span class="badge cx-badge">' + item.cx + ' complexity</span>'
        + '<span class="badge ' + (item.im === "High" ? "high-badge" : "med-badge") + '">' + item.im + ' impact</span>'
        + '<select class="status-sel" onchange="updSt(' + item.id + ', this.value)" onclick="event.stopPropagation()">'
        + Object.keys(SL).map(function(v) { return '<option value="' + v + '"' + (st === v ? " selected" : "") + '>' + SL[v] + '</option>'; }).join("")
        + '</select>'
        + '</div>'
        + '</div></div>';
      if (isSel) {
        h += '<div class="detail">'
          + '<h4>Implementation notes</h4>'
          + '<p>' + item.dt + '</p>'
          + '<div class="tags">'
          + item.af.map(function(a) { return '<span class="tag">affects: ' + a + '</span>'; }).join("")
          + '<span class="tag">new state: ' + item.sv + '</span>'
          + '</div>'
          + '</div>';
      }
    });
  });
  return h;
}

function render() {
  var doneItems = DATA.filter(function(d) { return sts[d.id] === "done"; });
  var prog      = DATA.filter(function(d) { return sts[d.id] === "in-progress"; }).length;
  var plan      = DATA.filter(function(d) { return sts[d.id] === "planned"; }).length;
  var pct       = Math.round((doneItems.length / DATA.length) * 100);

  document.getElementById("summary").innerHTML =
    stat(DATA.length, "Total features", "#e6edf3") +
    stat(doneItems.length, "Completed", "#3fb950") +
    stat(prog, "In progress", "#d4a843") +
    stat(plan, "Planned", "#8b949e");

  document.getElementById("progress").style.width = pct + "%";

  var activeItems = getActive();
  document.getElementById("active-count").textContent = activeItems.length + " remaining";
  document.getElementById("list").innerHTML = buildCards(activeItems);

  document.getElementById("done-count").textContent = doneItems.length + " features";
  document.getElementById("done-list").innerHTML = buildCards(doneItems);

  document.querySelectorAll(".fb").forEach(function(b) {
    b.classList.toggle("on", b.getAttribute("onclick").indexOf("'" + flt + "'") !== -1);
  });
}

function stat(n, l, color) {
  return '<div class="stat"><div class="num" style="color:' + color + '">' + n + '</div><div class="lbl">' + l + '</div></div>';
}

function setF(f) { flt = f; sel = null; render(); }
function tog(id) { sel = (sel === id ? null : id); render(); }
function updSt(id, v) { sts[id] = v; render(); }
function toggleDone() {
  doneOpen = !doneOpen;
  document.getElementById("done-section").classList.toggle("open", doneOpen);
  document.getElementById("done-arrow").classList.toggle("open", doneOpen);
}

render();
</script>
